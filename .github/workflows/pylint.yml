name: Lint

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install black flake8 pylint
      - run: black --check $(find pysamosa -name "*.py")
      - run: flake8 $(find pysamosa -name "*.py")
      - run: pylint $(find pysamosa -name "*.py")
